<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta Arquitectura Huella Inhouse | El Libertador</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .slide-enter { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .bolivar-green { color: #004A3B; }
        .bg-bolivar-green { background-color: #004A3B; }
        .bolivar-gold { color: #D4A056; }
        .bg-bolivar-gold { background-color: #D4A056; }
        .bolivar-gradient { background: linear-gradient(135deg, #004A3B 0%, #00382D 100%); }
        .nav-item-active { border-bottom: 3px solid #D4A056; color: #004A3B; font-weight: 800; background-color: #f1f5f9; }
        .architecture-node { transition: all 0.3s ease; cursor: default; }
        .architecture-node:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); border-color: #D4A056; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px;
            line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block;
            white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased;
        }

        /* BPMN Diagram styles */
        .bpmn-container { overflow-x: auto; overflow-y: hidden; }
        .bpmn-pool { border: 2px solid #334155; border-radius: 8px; margin-bottom: 4px; }
        .bpmn-pool-label { background: #1e293b; color: white; writing-mode: horizontal-tb; padding: 6px 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; min-width: 90px; display: flex; align-items: center; justify-content: center; border-radius: 6px 0 0 6px; flex-shrink: 0; }
        .bpmn-lane { display: flex; align-items: stretch; min-height: 80px; }
        .bpmn-content { display: flex; align-items: center; gap: 6px; padding: 12px; flex-wrap: nowrap; overflow-x: auto; flex: 1; }
        .bpmn-event-start { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #22c55e; background: #dcfce7; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; text-align: center; }
        .bpmn-event-end { width: 32px; height: 32px; border-radius: 50%; border: 4px solid #ef4444; background: #fee2e2; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .bpmn-event-timer { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #f59e0b; background: #fef3c7; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 8px; text-align: center; }
        .bpmn-event-intermediate { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #6366f1; background: #eef2ff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .bpmn-task { min-width: 90px; max-width: 110px; min-height: 44px; border: 1px solid #94a3b8; border-radius: 8px; background: white; padding: 6px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 9px; line-height: 1.2; font-weight: 600; color: #1e293b; flex-shrink: 0; }
        .bpmn-task-service { border-color: #004A3B; background: #f0fdf4; color: #004A3B; }
        .bpmn-task-send { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
        .bpmn-task-receive { border-color: #8b5cf6; background: #f5f3ff; color: #6d28d9; }
        .bpmn-gateway { width: 36px; height: 36px; background: white; border: 2px solid #f59e0b; transform: rotate(45deg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .bpmn-gateway-label { font-size: 8px; transform: rotate(-45deg); text-align: center; line-height: 1; font-weight: 700; }
        .bpmn-arrow { color: #64748b; font-size: 16px; flex-shrink: 0; }
        .bpmn-wrapper { display: flex; flex-direction: column; gap: 2px; min-width: max-content; }
        .bpmn-label { font-size: 8px; text-align: center; color: #475569; margin-top: 2px; max-width: 90px; }
        .bpmn-item { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .bpmn-connector { display: flex; align-items: center; padding: 0 2px; flex-shrink: 0; }
        .bpmn-connector-line { height: 2px; width: 20px; background: #94a3b8; }
        .bpmn-connector-arrow { width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 7px solid #94a3b8; }

        /* Comparison table */
        .comp-table { width: 100%; border-collapse: collapse; }
        .comp-table th { background: #004A3B; color: white; padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .comp-table td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; font-size: 11px; vertical-align: top; }
        .comp-table tr:nth-child(even) td { background: #f8fafc; }
        .badge-asis { background: #fee2e2; color: #ef4444; padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: 700; }
        .badge-tobe { background: #dcfce7; color: #16a34a; padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: 700; }

        /* Sync diagram */
        .sync-node { border-radius: 8px; padding: 10px 14px; font-size: 10px; font-weight: 700; text-align: center; min-width: 120px; }
        .sync-arrow { display: flex; align-items: center; justify-content: center; color: #cbd5e1; }
        .sync-arrow-v { display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body class="antialiased text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SlideLayout = ({ title, subtitle, children, currentStep, total, onNavClick }) => {
            const sections = [
                "Inicio", "Contexto", "Procesos BPMN", "Sincronización SAI", "Desistimiento",
                "Infra AS-IS", "Dolores", "Servicios API", "Arquitectura TO-BE", "OpenL", "O'Leary", "Roadmap"
            ];
            
            return (
                <div className="flex flex-col h-screen max-h-screen overflow-hidden">
                    <header className="bg-white border-b border-slate-200 px-6 py-2 flex flex-col md:flex-row justify-between items-center shadow-sm z-50">
                        <div className="flex items-center gap-4 mb-2 md:mb-0">
                            <img src="SB Logo2.png" onError={(e) => { e.target.onerror = null; e.target.src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Logo_Seguros_Bol%C3%ADvar.svg/1200px-Logo_Seguros_Bol%C3%ADvar.svg.png"; }} className="h-10 w-auto" alt="Logo Seguros Bolívar" />
                            <div className="h-8 w-[1px] bg-slate-200 hidden md:block"></div>
                            <div className="hidden md:block">
                                <h1 className="text-[10px] font-black text-[#004A3B] uppercase leading-none">Arquitectura</h1>
                                <p className="text-xs font-extrabold text-[#D4A056] uppercase tracking-wider">Huella Inhouse</p>
                            </div>
                        </div>
                        <nav className="flex items-center gap-1 overflow-x-auto max-w-full no-scrollbar px-2">
                            {sections.map((sec, idx) => (
                                <button key={idx} onClick={() => onNavClick(idx)} className={`px-3 py-2 text-[10px] uppercase tracking-widest font-bold transition-all whitespace-nowrap hover:text-[#004A3B] rounded-t-lg ${currentStep === idx ? 'nav-item-active' : 'text-slate-400'}`}>{sec}</button>
                            ))}
                        </nav>
                        <div className="hidden lg:flex items-center gap-2 font-black text-[10px] text-[#004A3B] uppercase tracking-widest">
                            Mesa de Trabajo Técnica
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto bg-[#F1F5F9] p-4 md:p-8">
                        <div className="max-w-[1400px] mx-auto slide-enter">
                            <div className="mb-6 border-l-4 border-[#D4A056] pl-6">
                                <h2 className="text-3xl font-black text-[#004A3B] tracking-tight uppercase italic">{title}</h2>
                                <p className="text-base text-slate-500 font-semibold mt-1">{subtitle}</p>
                            </div>
                            {children}
                        </div>
                    </main>

                    <footer className="bg-white border-t border-slate-200 p-3 flex justify-between items-center px-8 text-[10px] text-slate-400 font-bold uppercase tracking-widest italic no-print shadow-inner">
                        <p>Seguros Bolívar | Equipo de Arquitectura Empresarial</p>
                        <div className="flex gap-4 items-center">
                            <span className="text-[9px] font-black mr-2">Página {currentStep + 1} de {total}</span>
                            <button onClick={() => currentStep > 0 && onNavClick(currentStep - 1)} className="p-1 hover:bg-slate-100 rounded-full transition-colors border border-slate-200"><span className="material-symbols-outlined text-lg">chevron_left</span></button>
                            <button onClick={() => currentStep < total - 1 && onNavClick(currentStep + 1)} className="p-1 hover:bg-slate-100 rounded-full transition-colors border border-slate-200"><span className="material-symbols-outlined text-lg">chevron_right</span></button>
                        </div>
                    </footer>
                </div>
            );
        };

        // BPMN Helper Components
        const BpmnArrow = () => (
            <div className="bpmn-connector">
                <div className="bpmn-connector-line"></div>
                <div className="bpmn-connector-arrow"></div>
            </div>
        );

        const BpmnStart = ({ label }) => (
            <div className="bpmn-item">
                <div className="bpmn-event-start">▶</div>
                {label && <div className="bpmn-label">{label}</div>}
            </div>
        );

        const BpmnEnd = ({ label }) => (
            <div className="bpmn-item">
                <div className="bpmn-event-end"><div className="w-3 h-3 rounded-full bg-red-500"></div></div>
                {label && <div className="bpmn-label">{label}</div>}
            </div>
        );

        const BpmnTimer = ({ label }) => (
            <div className="bpmn-item">
                <div className="bpmn-event-timer">⏱</div>
                {label && <div className="bpmn-label">{label}</div>}
            </div>
        );

        const BpmnTask = ({ label, type }) => {
            const cls = type === 'service' ? 'bpmn-task bpmn-task-service' : type === 'send' ? 'bpmn-task bpmn-task-send' : type === 'receive' ? 'bpmn-task bpmn-task-receive' : 'bpmn-task';
            return (
                <div className="bpmn-item">
                    <div className={cls}>{label}</div>
                </div>
            );
        };

        const BpmnGateway = ({ label }) => (
            <div className="bpmn-item">
                <div className="bpmn-gateway"><div className="bpmn-gateway-label">◇</div></div>
                {label && <div className="bpmn-label mt-2">{label}</div>}
            </div>
        );

        const BpmnLane = ({ label, color, children }) => (
            <div className="bpmn-pool">
                <div className="bpmn-lane">
                    <div className="bpmn-pool-label" style={{ background: color || '#1e293b', minWidth: '100px' }}>
                        {label}
                    </div>
                    <div className="bpmn-content">
                        {children}
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [currentStep, setCurrentStep] = useState(0);

            const slides = [
                // 0: Portada
                {
                    title: "Soberanía Tecnológica",
                    subtitle: "Hacia una gestión de cartera nativa, eficiente y escalable",
                    content: (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center py-6">
                            <div className="space-y-6">
                                <div className="inline-flex items-center px-4 py-1 rounded-full bg-emerald-50 border border-emerald-100 text-[#004A3B] text-[10px] font-black uppercase tracking-widest">Iniciativa Inhouse 2026</div>
                                <h3 className="text-5xl lg:text-7xl font-black text-[#004A3B] leading-[0.95] tracking-tighter uppercase">Huella <br/><span className="text-[#D4A056] italic font-medium tracking-normal">Inhouse</span></h3>
                                <p className="text-slate-600 text-lg leading-relaxed font-medium">Propuesta técnica para eliminar la dependencia del proveedor <strong>Oracle Service Cloud (Imagine CX)</strong>, apalancando nuestras capacidades internas en AWS, OpenL Tablets y O'Leary.</p>
                                <div className="p-4 bg-white rounded-2xl border border-slate-200 flex gap-4 items-center shadow-sm max-w-md">
                                    <span className="material-symbols-outlined text-[#D4A056] text-3xl">model_training</span>
                                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-tight">Basado en hallazgos de repositorios, bases de datos, diagramas BPMN y servicios expuestos.</p>
                                </div>
                            </div>
                            <div className="bolivar-gradient p-10 rounded-[3rem] shadow-2xl text-white relative overflow-hidden">
                                <div className="absolute -top-10 -right-10 w-40 h-40 bg-white/5 rounded-full"></div>
                                <h4 className="text-2xl font-black mb-6 uppercase tracking-tighter text-[#D4A056]">Propuesta de Valor Core</h4>
                                <ul className="space-y-5 font-medium opacity-95 text-sm">
                                    <li className="flex gap-4 items-start"><span className="material-symbols-outlined text-[#D4A056]">savings</span> <div><strong>Ahorro Operativo OPEX:</strong> Eliminación de cobros externos por ajustes funcionales y almacenamiento documental.</div></li>
                                    <li className="flex gap-4 items-start"><span className="material-symbols-outlined text-[#D4A056]">account_tree</span> <div><strong>Gobernanza de Reglas:</strong> Centralización del 100% de las políticas de reparto en OpenL, eliminando scripts huérfanos.</div></li>
                                    <li className="flex gap-4 items-start"><span className="material-symbols-outlined text-[#D4A056]">security</span> <div><strong>Cumplimiento Normativo:</strong> Custodia institucional de grabaciones y pagarés en O'Leary Connect.</div></li>
                                    <li className="flex gap-4 items-start"><span className="material-symbols-outlined text-[#D4A056]">schema</span> <div><strong>Procesos Documentados:</strong> 3 procesos BPMN críticos identificados y analizados en profundidad.</div></li>
                                </ul>
                            </div>
                        </div>
                    )
                },
                // 1: Contexto de Negocio (KPIs)
                {
                    title: "Contexto de Negocio (KPIs)",
                    subtitle: "Indicadores clave que la arquitectura debe soportar y optimizar",
                    content: (
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                            {[
                                { label: "Siniestralidad Mensual", val: "$40.000M", desc: "COP mensuales reportados en avisos de siniestro. Es el punto de partida del flujo operativo.", icon: "bar_chart" },
                                { label: "Meta Desistimiento", val: "75%", desc: "KPI crítico. Porcentaje de siniestros que deben ser pagados por inquilinos antes del día 23.", icon: "track_changes" },
                                { label: "Capacidad de Recobro", val: "$17.000M", desc: "Promedio mensual indemnizado a inmobiliarias que entra a fase de restitución/recobro.", icon: "account_balance_wallet" },
                                { label: "Volumen de Transacciones", val: "+100k", desc: "Registros sincronizados mensualmente entre SAI y Huella que saturan el Job de migración actual.", icon: "sync" },
                                { label: "Mora Activa", val: "86.000", desc: "Número de solicitudes vigentes en proceso de cobro gestionadas por los asesores.", icon: "group" },
                                { label: "Brecha Davivienda", val: "N/A", desc: "Liquidaciones generadas pero no conciliadas/recaudadas, requiriendo revisión manual.", icon: "warning" }
                            ].map((item, i) => (
                                <div key={i} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 architecture-node flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="material-symbols-outlined text-[#D4A056] text-3xl">{item.icon}</span>
                                            <span className="text-[9px] font-black bg-slate-100 text-slate-400 px-2 py-1 rounded-full">KPI</span>
                                        </div>
                                        <h4 className="font-black text-[#004A3B] uppercase text-[10px] tracking-widest">{item.label}</h4>
                                        <p className="text-3xl font-black text-slate-800 my-2 tracking-tighter">{item.val}</p>
                                    </div>
                                    <p className="text-[11px] text-slate-500 font-medium leading-snug border-t border-slate-100 pt-3 mt-2">{item.desc}</p>
                                </div>
                            ))}
                        </div>
                    )
                },
                // 2: Visión General Procesos BPMN
                {
                    title: "Procesos de Negocio (BPMN)",
                    subtitle: "Visión general de los 3 procesos críticos identificados en la operación Huella",
                    content: (
                        <div className="space-y-6">
                            <div className="bg-emerald-50 border border-emerald-200 p-4 rounded-2xl flex gap-3 items-start">
                                <span className="material-symbols-outlined text-emerald-600 text-2xl mt-0.5">info</span>
                                <div>
                                    <p className="text-xs font-black text-emerald-800 uppercase tracking-widest">Hallazgo de Análisis</p>
                                    <p className="text-xs text-emerald-700 mt-1 font-medium">Se identificaron y documentaron <strong>3 procesos BPMN clave</strong> que Huella soporta actualmente. Estos procesos evidencian el alto valor de negocio de la herramienta y la complejidad que la nueva arquitectura inhouse debe preservar y mejorar.</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-3xl border-t-4 border-[#004A3B] shadow-sm architecture-node">
                                    <span className="material-symbols-outlined text-[#004A3B] text-3xl mb-3">sync_alt</span>
                                    <h4 className="font-black text-slate-800 text-sm uppercase mb-2">Sincronización SAI → Huella</h4>
                                    <p className="text-xs text-slate-500 leading-relaxed font-medium mb-4">Flujo técnico de sincronización de datos de siniestros entre SAI (core) y Huella (CRM). Involucra triggers, tablas MIG, Jobs PL/SQL y llamados SOAP/REST vía Oracle Service Bus.</p>
                                    <div className="space-y-1">
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>34+ tablas de migración</div>
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>Job cada 5 minutos</div>
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>Cuello de botella identificado</div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border-t-4 border-[#D4A056] shadow-sm architecture-node">
                                    <span className="material-symbols-outlined text-[#D4A056] text-3xl mb-3">cancel</span>
                                    <h4 className="font-black text-slate-800 text-sm uppercase mb-2">Proceso de Desistimiento</h4>
                                    <p className="text-xs text-slate-500 leading-relaxed font-medium mb-4">Proceso BPMN multi-actor (Inmobiliaria, Asesor, Planeación, Inteligencia, Comercial, Indemnizaciones) para la gestión del KPI del 75% de desistimiento antes del día 23 del mes.</p>
                                    <div className="space-y-1">
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>6 pools participantes</div>
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>Evolución 2023 → 2025</div>
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>Crítico para el 75% meta</div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border-t-4 border-slate-600 shadow-sm architecture-node">
                                    <span className="material-symbols-outlined text-slate-600 text-3xl mb-3">contacts</span>
                                    <h4 className="font-black text-slate-800 text-sm uppercase mb-2">Actualización Datos de Contacto</h4>
                                    <p className="text-xs text-slate-500 leading-relaxed font-medium mb-4">Flujo de enriquecimiento de datos de contacto de arrendatarios y codeudores usando Datacredito. Proceso manual que se carga vía plantilla masiva en Huella.</p>
                                    <div className="space-y-1">
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>Proceso manual hoy</div>
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>Max 6 hrs hábiles</div>
                                        <div className="flex items-center gap-2 text-[10px] font-bold text-slate-600"><span className="material-symbols-outlined text-xs text-[#D4A056]">circle</span>Automatizable en TO-BE</div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                <h4 className="font-black text-[#004A3B] uppercase text-xs tracking-widest mb-4">Actores del Ecosistema Huella</h4>
                                <div className="flex flex-wrap gap-3">
                                    {["Inmobiliaria", "Outsourcing / Asesor Libertador", "Planeación", "Asesor Inteligencia de Negocio", "Comercial", "Indemnizaciones", "Supervisor EL", "SAI (Core)"].map((actor, i) => (
                                        <div key={i} className={`px-3 py-1.5 rounded-full text-[10px] font-bold ${i < 2 ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : i < 5 ? 'bg-blue-50 text-blue-700 border border-blue-100' : 'bg-amber-50 text-amber-700 border border-amber-100'}`}>
                                            {actor}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )
                },
                // 3: BPMN Sincronización SAI-Huella
                {
                    title: "BPMN: Sincronización SAI → Huella",
                    subtitle: "Arquitectura de sincronización de datos entre el core SAI y el CRM Huella (AS-IS)",
                    content: (
                        <div className="space-y-6">
                            <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
